<!doctype html>
<html>
  <head>
    <meta charset = "utf-8"> 
    <title>404：not found</title>
    <style>
      .center
      {
        text-align:center; 
      }
      .inline
      {
        display:inline; 
      }
    </style>
  </head>
  <body>
    <h1 class = "center"><b>眠龙勿扰集团有限公司：未找到页面</b></h1>
    <h1 class = "center"><b>404：not found</b></h1>
    <h1 class = "center"><b>建议您填写正确的域名！</b></h1>
    <div class = "center">
      <h1 class = "inline"><b>还有</b></h1>
      <h1 class = "inline"><b id = "sp">5</b></h1>
      <h1 class = "inline">秒跳转</h1>
    </div>
    <script type="text/javascript">
    onload=function(){
    setInterval(go, 1000);
    };
    var x=5; //利用了全局变量来执行
    function go(){
    x--;
    if(x>0){
    document.getElementById("sp").innerHTML=x; //每次设置的x的值都不一样了。
    }else{
    location.href='https://franciswizard.github.io/company';
    }
    }
    </script>
  </body>
